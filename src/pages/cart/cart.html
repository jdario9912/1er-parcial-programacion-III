<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../../style.css" />
        <title>Carrito</title>
    </head>
    <body>
        <div id="header"></div>
        <main>
            <div>
                <h2 class="cart-title">Carrito</h2>
                <div class="cart-container">
                    <div id="cart-list" class="cart-list">
                        <div class="cart-card">
                            <div class="cart-card-image">
                                <img src="/images/bebida.png" alt="Producto" />
                            </div>
                            <div class="cart-card-info">
                                <div class="cart-card-details">
                                    <div>
                                        <h3 class="cart-card-name">Nombre</h3>
                                        <p class="cart-card-category">
                                            Categoria
                                        </p>
                                    </div>
                                    <p class="cart-card-price">
                                        Subtotal: $100
                                    </p>
                                </div>
                                <div class="cart-card-actions">
                                    <div class="cart-card-quantity">
                                        <button>-</button><span>1</span
                                        ><button>+</button>
                                    </div>
                                    <button class="remove-button">
                                        Eliminar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="cart-resume">
                        <h4>Resumen</h4>
                        <div id="subtotal"></div>
                        <div id="total"></div>
                        <div id="resumen-buttons">
                            <button>Finalizar compra</button>
                            <button>Vaciar carrito</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </body>
    <script type="module" src="./cart.ts"></script>
</html>
